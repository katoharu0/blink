let audioCtx=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq,dur,type='square',gain=0.18,detune=0){
  try{
    const a=getAudio();
    const o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(gain,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
function sfxJump(){ beep(320,0.12,'square',0.14); beep(480,0.08,'square',0.08); }

  beep(player.phase===BLUE?600:300,0.06,'sawtooth',0.12);

// ---- BGM スケジューラ（チップチューン風ループ） ----
let bgmNext=0, bgmStep=0, bgmOn=false;
const BGM_SPB=60/138/2;  // 8分音符1つの秒数（138BPM）
// BLUE フェーズ：明るめのアルペジオ
const BGM_B=[261,330,392,523, 392,330,261,196];
// RED フェーズ：緊張感のある音列
const BGM_R=[349,440,523,440, 349,294,349,392];
// ベースライン（2拍おき）
const BGM_BASS_B=[65,65,82,82, 65,65,98,98];
const BGM_BASS_R=[87,87,110,110,87,87,73,73];

function bgmTick(){
  if(!bgmOn) return;
  const a=getAudio();
  while(bgmNext<a.currentTime+0.25){
    const idx=bgmStep%8;
    const pat=player.phase===BLUE?BGM_B:BGM_R;
    const bass=player.phase===BLUE?BGM_BASS_B:BGM_BASS_R;
    const t=bgmNext;
    // メロディ
    try{
      const o=a.createOscillator(), g=a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type='square'; o.frequency.value=pat[idx];
      g.gain.setValueAtTime(0.055,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+BGM_SPB*0.85);
      o.start(t); o.stop(t+BGM_SPB*0.85);
    }catch(e){}
    // ベース（偶数ステップのみ）
    if(idx%2===0){
      try{
        const o2=a.createOscillator(), g2=a.createGain();
        o2.connect(g2); g2.connect(a.destination);
        o2.type='triangle'; o2.frequency.value=bass[idx];
        g2.gain.setValueAtTime(0.07,t);
        g2.gain.exponentialRampToValueAtTime(0.001,t+BGM_SPB*1.8);
        o2.start(t); o2.stop(t+BGM_SPB*1.8);
      }catch(e){}
    }
    bgmStep++;
    bgmNext+=BGM_SPB;
  }
}

function startBGM(){
  const a=getAudio();
  bgmNext=a.currentTime+0.05;
  bgmStep=0; bgmOn=true;
}
function stopBGM(){ bgmOn=false; }

// パーティクル

function addParticle(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,maxLife:50,color});
  }
}

// ================================================================

const K={};
addEventListener('keydown',e=>{K[e.code]=true; if(['Space','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>{K[e.code]=false;});

const touch={L:false,R:false,J:false,S:false,D:false};
function touchZone(cx,cy){
  const gx=cx/scale, gy=cy/scale;
  if(gy<GH*0.52) return null;
  if(gx<GW*0.16) return 'L';
  if(gx<GW*0.32) return 'R';
  if(gx>GW*0.38&&gx<GW*0.54) return 'D';  // エアダッシュ（中央）
  if(gx>GW*0.58&&gx<GW*0.76) return 'S';
  if(gx>GW*0.76) return 'J';
  return null;
}
function applyTouches(e){
  touch.L=touch.R=touch.J=touch.S=touch.D=false;
  for(const t of e.touches){
    const z=touchZone(t.clientX,t.clientY);
    if(z) touch[z]=true;
  }
}
C.addEventListener('touchstart',e=>{e.preventDefault();applyTouches(e);},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();applyTouches(e);},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();applyTouches(e);},{passive:false});

const isL=()=>K.ArrowLeft||K.KeyA||touch.L;
const isR=()=>K.ArrowRight||K.KeyD||touch.R;
const isJ=()=>K.Space||K.ArrowUp||K.KeyW||touch.J;
const isSH=()=>K.KeyQ||K.KeyZ||touch.S;
const isDA=()=>K.KeyX||K.KeyC||touch.D;

    dead:false, deadTimer:0,
    invincible:0,
    facingR:true,
    shiftCD:0, shiftFlash:0,
    portalCD:0,
    animF:0, animT:0,
    small:false, smallTimer:0,
    prevJ:false, prevSH:false,
    coyoteTimer:0,    // コヨーテタイム（崖端ジャンプ猶予）
    jumpBuffer:0,     // ジャンプバッファ（少し早押しでもジャンプ）
    scaleY:1,         // スクワッシュ＆ストレッチ用縦スケール
    prevVy:0,         // 前フレームの縦速度（着地判定用）
    dashReady:true,   // エアダッシュ使用可能か
    dashTimer:0,      // ダッシュ中フレーム数（>0でダッシュ中）
    prevDA:false,     // 前フレームのダッシュ入力
  };
}

// ================================================================
//  ヘルパー
// ================================================================
function stg(){ return STAGES[si]; }
function tileActive(type){
  if(type===TL.BLUE) return player.phase===BLUE;
  if(type===TL.RED)  return player.phase===RED;
  return true;
}
function isSolid(type){
  return type===TL.SOLID||type===TL.BLUE||type===TL.RED||
         type===TL.RHYTHM||type===TL.CONV_R||type===TL.CONV_L||type===TL.ONEWAY;
}
function rhythmOn(){ return (fr%90)<52; }
function canJumpNow(){ return player.onGround||player.coyoteTimer>0||(player.onWall!==0&&!player.onGround); }

// タイルIDキー（ステージ跨ぎ対策）
function tileId(tile){ return tile[0]*1000+tile[1]; }

// ================================================================
//  更新
// ================================================================
let prevJ=false, prevSH=false, shiftCD=0;

function update(){
  if(gameState!=='playing') return;
  fr++;

  // 移動床更新
  for(const m of movers){
    const prev=m.x;
    m.x+=m.speed*m.dir;
    if(m.x>m.ox+m.range||m.x<m.ox){ m.dir*=-1; m.x=Math.max(m.ox,Math.min(m.ox+m.range,m.x)); }
    const dx=m.x-prev;
    // プレイヤーが乗っているか（上面に接触）
    const px=player.x, py=player.y, pw=player.w, ph=player.h;
    const overlap=px+pw>m.x&&px<m.x+m.w&&py+ph>=m.y-1&&py+ph<=m.y+4;
    if(overlap&&!player.dead){ player.x+=dx; player.onGround=true; }
  }

  // 敵更新
  for(const e of enemies){
    // フェーズ限定の敵は現フェーズ以外スキップ
    if(e.phase!==0&&e.phase!==player.phase) continue;
    e.x+=e.speed*e.dir;
    e.animT++;
    if(e.x>e.ox+e.range||e.x<e.ox){ e.dir*=-1; e.x=Math.max(e.ox,Math.min(e.ox+e.range,e.x)); }
    // プレイヤーとの当たり判定
    if(!player.dead&&player.invincible<=0){
      const px=player.x,py=player.y,pw=player.w,ph=player.h;
      if(px+pw>e.x&&px<e.x+e.w&&py+ph>e.y&&py<e.y+e.h){
        killPlayer();
      }
    }
  }

  // 残像更新
  ghosts=ghosts.filter(g=>{ g.life--; return g.life>0; });

  // パーティクル更新
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    return p.life>0;
  });

  // BGMスケジュール
  bgmTick();

  if(player.dead){
    player.deadTimer++;
    if(player.deadTimer>75) respawn();
    return;
  }
  if(player.invincible>0) player.invincible--;
  if(player.portalCD>0) player.portalCD--;
  if(player.smallTimer>0){ player.smallTimer--; }
  else { player.small=false; }

  const s=stg();
  const ph=player.w, pv=player.h;

  // フェーズ切替
  if(shiftCD>0) shiftCD--;
  const nowSH=isSH();
  if(nowSH&&!prevSH&&shiftCD>0){
    // CDまだ残っているとき: 短くブザー音
    beep(180,0.04,'square',0.06);
  }
  if(nowSH&&!prevSH&&shiftCD===0){
    // 残像を3枚スポーン（シフト前の色で）
    for(let g=0;g<3;g++){
      ghosts.push({x:player.x+g*1.5,y:player.y,w:player.w,h:player.h,
        color:player.phase===BLUE?'#3388ff':'#ff3333',
        life:18-g*5, maxLife:18});
    }
    player.phase=1-player.phase;
    shiftCD=15;
    player.shiftFlash=10;
    addParticle(player.x+player.w/2, player.y+player.h/2,
      player.phase===BLUE?'#4af':'#f44',12);
    sfxShift();
  }
  prevSH=nowSH;
  if(player.shiftFlash>0) player.shiftFlash--;

  // プレイヤーの実サイズ
  const pw=player.small?8:12, pvh=player.small?10:14;
  player.w=pw; player.h=pvh;

  // 重力反転ゾーン判定（中心で判定）
  const cx=player.x+pw/2, cy=player.y+pvh/2;
  let inGrav=false;
  for(const tile of s.tiles){
    if(tile[4]!==TL.GRAV) continue;
    const tx=tile[0]*T,ty=tile[1]*T,tw=tile[2]*T,th=tile[3]*T;
    if(cx>tx&&cx<tx+tw&&cy>ty&&cy<ty+th){inGrav=true;break;}
  }
  player.gravDir=inGrav?-1:1;

  // 水平移動
  let ax=0;
  if(isL()){ ax=-1; player.facingR=false; }
  if(isR()){ ax=1;  player.facingR=true;  }
  player.vx = ax!==0 ? ax*MSPD : player.vx*0.65;

  // 風・コンベア
  for(const tile of s.tiles){
    const type=tile[4];
    if(type!==TL.WINDR&&type!==TL.WINDL&&type!==TL.WINDU&&
       type!==TL.CONV_R&&type!==TL.CONV_L) continue;
    const tx=tile[0]*T,ty=tile[1]*T,tw=tile[2]*T,th=tile[3]*T;
    const inTile=cx>tx&&cx<tx+tw&&cy>ty&&cy<ty+th;
    const onConv=player.x+pw>tx&&player.x<tx+tw&&
                 Math.abs(player.y+pvh-(ty))<4&&player.vy>=0;
    if(type===TL.WINDR&&inTile) player.vx+=0.35;
    if(type===TL.WINDL&&inTile) player.vx-=0.35;
    if(type===TL.WINDU&&inTile) player.vy-=0.55;
    if(type===TL.CONV_R&&onConv) player.vx+=1.2;
    if(type===TL.CONV_L&&onConv) player.vx-=1.2;
  }

  // 速度制限
  player.vx=Math.max(-6,Math.min(6,player.vx));

  // 重力
  player.vy+=GRAV*player.gravDir;
  player.vy=Math.max(-10,Math.min(10,player.vy));

  // コヨーテタイム管理
  if(player.onGround) player.coyoteTimer=8;
  else if(player.coyoteTimer>0) player.coyoteTimer--;

  // ジャンプバッファ管理
  const nowJ=isJ();
  if(nowJ&&!prevJ) player.jumpBuffer=10;
  else if(player.jumpBuffer>0) player.jumpBuffer--;

  if(player.jumpBuffer>0&&canJumpNow()){
    if(player.onWall!==0&&!player.onGround){
      player.vy=WJSPD.y*player.gravDir;
      player.vx=-player.onWall*WJSPD.x;
      // 壁ジャンプ時スパーク
      addParticle(player.x+(player.onWall>0?player.w:0), player.y+player.h/2,
        player.phase===BLUE?'#88ddff':'#ffaa88', 6);
      player.onWall=0;
    } else {
      player.vy=JSPD*player.gravDir;
      player.onGround=false;
      player.coyoteTimer=0;
    }
    player.jumpBuffer=0;
    player.scaleY=0.65;  // ジャンプ時に横に潰れる
    sfxJump();
  }
  prevJ=nowJ;

  // エアダッシュ
  if(player.onGround) player.dashReady=true;
  if(player.dashTimer>0){ player.dashTimer--; player.invincible=Math.max(player.invincible,player.dashTimer+1); }
  const nowDA=isDA();
  if(nowDA&&!player.prevDA&&player.dashReady&&!player.onGround){
    const dir=player.facingR?1:-1;
    player.vx=dir*9;
    player.vy=player.vy*0.3;  // 縦速度を少し殺す
    player.dashTimer=10;
    player.dashReady=false;
    player.scaleY=0.5;
    // ダッシュ残像を4枚
    for(let d=0;d<4;d++) ghosts.push({
      x:player.x-dir*d*6, y:player.y, w:player.w, h:player.h,
      color:player.phase===BLUE?'#3388ff':'#ff3333',
      life:12-d*3, maxLife:12
    });
    addParticle(player.x+player.w/2,player.y+player.h/2,
      player.phase===BLUE?'#88ccff':'#ffaa66',8);
    sfxDash();
  }
  player.prevDA=nowDA;

  // X移動 → 衝突
  player.x+=player.vx;
  player.onWall=0;
  solveX(s,pw,pvh);

  // Y移動 → 衝突
  player.y+=player.vy;
  player.onGround=false;
  solveY(s,pw,pvh);

  // 各種ギミック判定
  checkGimmicks(s,pw,pvh);

  // 画面外
  if(player.y>s.wh*T+40) killPlayer();

  // アニメ
  if(Math.abs(player.vx)>0.5&&player.onGround){
    player.animT++;
    if(player.animT>6){ player.animT=0; player.animF=(player.animF+1)%4; }
  } else player.animF=0;

  // スクワッシュ＆ストレッチを1に収束
  player.scaleY+=(1-player.scaleY)*0.22;

  // カメラ
  const tx2=player.x+pw/2-GW/2, ty2=player.y+pvh/2-GH/2;
  cam.x+=(tx2-cam.x)*0.12; cam.y+=(ty2-cam.y)*0.12;
  cam.x=Math.max(0,Math.min(s.ww*T-GW,cam.x));
  cam.y=Math.max(0,Math.min(s.wh*T-GH,cam.y));

  // camShake減算
  if(camShake>0) camShake--;
  // stageIntro減算
  if(stageIntroT>0) stageIntroT--;
}

function solveX(s,pw,pvh){
  for(const tile of s.tiles){
    const type=tile[4];
    if(!isSolid(type)||!tileActive(type)) continue;
    if(type===TL.DOOR&&colKeys<s.keys) continue;
    if(type===TL.RHYTHM&&!rhythmOn()) continue;
    if(type===TL.ONEWAY) continue;
    const tx=tile[0]*T,ty=tile[1]*T,tw=tile[2]*T,th=tile[3]*T;
    if(player.x<tx+tw&&player.x+pw>tx&&player.y+2<ty+th&&player.y+pvh-2>ty){
      if(player.vx>0){ player.x=tx-pw; player.onWall=1; }
      else           { player.x=tx+tw; player.onWall=-1;}
      player.vx=0;
    }
  }
}

function solveY(s,pw,pvh){
  for(const tile of s.tiles){
    const type=tile[4];
    if(!isSolid(type)||!tileActive(type)) continue;
    if(type===TL.DOOR&&colKeys<s.keys) continue;
    if(type===TL.RHYTHM&&!rhythmOn()) continue;
    const tx=tile[0]*T,ty=tile[1]*T,tw=tile[2]*T,th=tile[3]*T;

    // 一方通行: 上から降りてきたときのみ
    if(type===TL.ONEWAY){
      if(player.vy*player.gravDir>0&&
         player.x+pw-2>tx&&player.x+2<tx+tw&&
         player.y+pvh-player.vy<=ty+2){
        player.y=ty-pvh; player.vy=0; player.onGround=true;
      }
      continue;
    }
    if(player.x+2<tx+tw&&player.x+pw-2>tx&&player.y<ty+th&&player.y+pvh>ty){
      if(player.vy*player.gravDir>0){
        player.y=player.gravDir>0? ty-pvh : ty+th;
        if(Math.abs(player.vy)>3) player.scaleY=1.4;  // 着地スクワッシュ
        player.vy=0; player.onGround=true;
      } else {
        player.y=player.gravDir>0? ty+th : ty-pvh;
        player.vy=0;
      }
    }
  }
}

function checkGimmicks(s,pw,pvh){
  const cx=player.x+pw/2, cy=player.y+pvh/2;
  for(let i=0;i<s.tiles.length;i++){
    const tile=s.tiles[i];
    const type=tile[4];
    const tx=tile[0]*T,ty=tile[1]*T,tw=tile[2]*T,th=tile[3]*T;
    const hit=player.x+pw>tx+2&&player.x<tx+tw-2&&player.y+pvh>ty+2&&player.y<ty+th-2;
    const softHit=player.x+pw>tx&&player.x<tx+tw&&player.y+pvh>ty&&player.y<ty+th;

    if(type===TL.SPIKE&&hit){ killPlayer(); return; }

    if(type===TL.SPRING&&player.x+pw>tx&&player.x<tx+tw&&
       player.y+pvh>=ty&&player.y+pvh<=ty+th+6&&player.vy*player.gravDir>0){
      player.vy=JSPD*2.5*player.gravDir;
      player.onGround=false;
      addParticle(tx+tw/2,ty,'#4f8',8);
      sfxSpring();
    }

    if((type===TL.PORTA||type===TL.PORTB)&&softHit&&player.portalCD===0){
      const target=type===TL.PORTA?TL.PORTB:TL.PORTA;
      for(const t2 of s.tiles){
        if(t2[4]!==target) continue;
        player.x=t2[0]*T+(t2[2]*T-pw)/2;
        player.y=t2[1]*T+(t2[3]*T-pvh)/2;
        player.portalCD=40;
        addParticle(player.x+pw/2,player.y+pvh/2,'#f0f',12);
        break;
      }
    }

    if(type===TL.KEY&&!colKeySet.has(i)&&hit){
      colKeySet.add(i); colKeys++;
      addParticle(tx+tw/2,ty+th/2,'#fc0',10);
      sfxKey();
    }

    if(type===TL.SMALL&&!colSmallSet.has(i)&&hit){
      colSmallSet.add(i);
      player.small=true; player.smallTimer=300;
      addParticle(tx+tw/2,ty+th/2,'#f8f',8);
      sfxKey();
    }

    if(type===TL.CHECK&&!colCheckSet.has(i)&&hit){
      colCheckSet.add(i);
      checkpoint={x:tx,y:ty};
      addParticle(tx+tw/2,ty,'#0f8',10);
      sfxCheck();
    }

    if(type===TL.GOAL&&hit){
      // ゴール時の豪華パーティクル
      for(let k=0;k<5;k++){
        addParticle(player.x+player.w/2,player.y+player.h/2,'#fc0',8);
        addParticle(tx+tw/2,ty+th/2,'#fff',6);
        addParticle(tx+tw/2,ty+th/2,player.phase===BLUE?'#4af':'#f44',6);
      }
      clearStage(); return;
    }
  }
}

function killPlayer(){
  if(player.invincible>0) return;
  const cx=player.x+player.w/2, cy=player.y+player.h/2;
  const c1=player.phase===BLUE?'#4af':'#f44';
  const c2=player.phase===BLUE?'#88eeff':'#ffaa44';
  addParticle(cx,cy,c1,18);
  addParticle(cx,cy,c2,10);
  addParticle(cx,cy,'#fff',5);
  player.dead=true; player.deadTimer=0;
  camShake=14;
  deathCount++;
  sfxDie();
}

function respawn(){
  const prevPhase=player.phase;
  initPlayer();
  player.phase=prevPhase;  // フェーズはリセットしない
  // チェックポイントがあれば鍵をリセットせずそこからリスポーン
  if(checkpoint){
    player.x=checkpoint.x;
    player.y=checkpoint.y-player.h;
    // 鍵はチェックポイント到達後に取ったものだけリセット
    // シンプルにするため鍵もそのまま保持（死んでも鍵は消えない）
  } else {
    colKeys=0; colKeySet.clear();
  }
  colSmallSet.clear();
}

function clearStage(){
  gameState='clear'; fr=0;
  sfxGoal();
  // 自己ベスト更新チェック
  const key=`blink_best_s${si}`;
  const prev=Number(localStorage.getItem(key)||0);
  if(!prev||stageTime<prev){
    localStorage.setItem(key, stageTime);
    clearIsNewBest=true;
  } else {
    clearIsNewBest=false;
  }
  clearBestTime=Number(localStorage.getItem(key));
}
let clearIsNewBest=false, clearBestTime=0;

// ================================================================
//  描画
// ================================================================
function draw(){
  const s=stg();
  ctx.fillStyle=player.phase===BLUE?s.bgB:s.bgR;
  ctx.fillRect(0,0,GW,GH);

  // 視差スクロール星
  for(const st of STARS){
    const wx=(st.x-cam.x*st.pf%(GW*4)+GW*4)%(GW*4);
    const wy=(st.y-cam.y*st.pf%(GH*4)+GH*4)%(GH*4);
    if(wx<GW&&wy<GH){
      ctx.globalAlpha=st.br*(0.5+Math.sin(fr*0.03+st.x)*0.2);
      ctx.fillStyle='#ffffff';
      ctx.fillRect(wx,wy,st.sz,st.sz);
    }
  }
  ctx.globalAlpha=1;

  // グリッド
  ctx.strokeStyle=player.phase===BLUE?'rgba(0,80,200,.06)':'rgba(200,40,40,.06)';
  ctx.lineWidth=1;
  for(let x=(-cam.x%T+T)%T;x<GW;x+=T){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GH);ctx.stroke();}
  for(let y=(-cam.y%T+T)%T;y<GH;y+=T){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GW,y);ctx.stroke();}

  ctx.save();
  // 死亡シェイク
  const sx=camShake>0?(Math.random()-.5)*camShake*.8:0;
  const sy=camShake>0?(Math.random()-.5)*camShake*.6:0;
  ctx.translate(-cam.x+sx,-cam.y+sy);

  // タイル
  for(let i=0;i<s.tiles.length;i++) drawTile(s.tiles[i],i);

  // 敵
  for(const e of enemies){
    if(e.phase!==0&&e.phase!==player.phase) continue;
    const bob=Math.sin(e.animT*0.12)*1.5;
    // 本体（丸っこい三角形っぽい敵）
    ctx.fillStyle='#ff6600';
    ctx.beginPath();
    ctx.moveTo(e.x+e.w/2,e.y+bob);
    ctx.lineTo(e.x+e.w,e.y+e.h+bob);
    ctx.lineTo(e.x,e.y+e.h+bob);
    ctx.closePath();ctx.fill();
    // 目（白目+黒目）
    ctx.fillStyle='#fff';ctx.fillRect(e.x+2,e.y+4+bob,3,3);
    ctx.fillStyle='#111';ctx.fillRect(e.dir>0?e.x+3:e.x+2,e.y+5+bob,2,2);
    // 足（点滅）
    ctx.fillStyle='#ff4400';
    ctx.fillRect(e.x+1,e.y+e.h+bob,3,2);
    ctx.fillRect(e.x+e.w-4,e.y+e.h+bob,3,2);
  }

  // 移動床
  for(const m of movers){
    const sc=STAGES[si].solidC||['#445566','#667788','#334455'];
    ctx.fillStyle=sc[0];ctx.fillRect(m.x,m.y,m.w,m.h);
    ctx.fillStyle=sc[1];ctx.fillRect(m.x,m.y,m.w,2);
    ctx.fillStyle=sc[2];ctx.fillRect(m.x,m.y+m.h-2,m.w,2);
    // 矢印で移動方向を示す
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#fff';
    ctx.font='7px monospace';
    ctx.fillText(m.dir>0?'▶':'◀',m.x+m.w/2-4,m.y+m.h/2+3);
    ctx.globalAlpha=1;
  }

  // パーティクル
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;

  // 残像（プレイヤーの後ろに描く）
  for(const g of ghosts){
    ctx.globalAlpha=(g.life/g.maxLife)*0.45;
    ctx.fillStyle=g.color;
    ctx.fillRect(g.x,g.y,g.w,g.h);
  }
  ctx.globalAlpha=1;

  drawPlayer();
  ctx.restore();

  drawHUD(s);
  drawTouchButtons();

  // フェーズフラッシュ
  if(player.shiftFlash>0){
    ctx.fillStyle=(player.phase===BLUE?'rgba(40,120,255,':'rgba(255,50,50,')+player.shiftFlash/10*0.28+')';
    ctx.fillRect(0,0,GW,GH);
  }

  if(gameState==='clear') drawClearScreen();
  if(stageIntroT>0) drawStageIntro(s);
}

function drawTile(tile,idx){
  const [tx,ty,tw,th,type]=tile;
  const rx=tx*T,ry=ty*T,rw=tw*T,rh=th*T;
  switch(type){
    case TL.SOLID:{
      const sc=STAGES[si].solidC||['#445566','#667788','#334455'];
      ctx.fillStyle=sc[0];ctx.fillRect(rx,ry,rw,rh);
      ctx.fillStyle=sc[1];ctx.fillRect(rx,ry,rw,2);
      ctx.fillStyle=sc[2];ctx.fillRect(rx,ry+rh-2,rw,2);
      break;}

    case TL.BLUE:
      if(player.phase===BLUE){
        ctx.fillStyle='#1a60ff';ctx.fillRect(rx,ry,rw,rh);
        ctx.fillStyle='#66aaff';ctx.fillRect(rx,ry,rw,2);
      } else {
        ctx.strokeStyle='rgba(30,100,255,.2)';ctx.lineWidth=1;
        ctx.strokeRect(rx+.5,ry+.5,rw-1,rh-1);
      }
      break;
    case TL.RED:
      if(player.phase===RED){
        ctx.fillStyle='#ff2020';ctx.fillRect(rx,ry,rw,rh);
        ctx.fillStyle='#ff7777';ctx.fillRect(rx,ry,rw,2);
      } else {
        ctx.strokeStyle='rgba(255,40,40,.2)';ctx.lineWidth=1;
        ctx.strokeRect(rx+.5,ry+.5,rw-1,rh-1);
      }
      break;
    case TL.SPIKE:
      ctx.fillStyle='#778899';
      for(let i=0;i<rw/T;i++){
        ctx.beginPath();
        ctx.moveTo(rx+i*T,ry+rh);ctx.lineTo(rx+i*T+T/2,ry);ctx.lineTo(rx+i*T+T,ry+rh);
        ctx.fill();
      }
      break;
    case TL.SPRING:
      ctx.fillStyle='#22cc66';ctx.fillRect(rx,ry+rh-4,rw,4);
      ctx.fillStyle='#55ee99';ctx.fillRect(rx+3,ry+2,rw-6,rh-6);
      ctx.fillStyle='#88ffbb';ctx.fillRect(rx+3,ry+2,rw-6,3);
      break;
    case TL.PORTA:
      drawPortal(rx,ry,rw,rh,'#00ffff','#0088ff');break;
    case TL.PORTB:
      drawPortal(rx,ry,rw,rh,'#ff00ff','#8800ff');break;
    case TL.GRAV:{
      const a=.18+Math.sin(fr*.07)*.06;
      ctx.fillStyle=`rgba(140,0,220,${a})`;ctx.fillRect(rx,ry,rw,rh);
      ctx.fillStyle='rgba(180,80,255,.45)';
      const off=(fr*0.6)%T;
      for(let ay=ry;ay<ry+rh+T;ay+=T){
        ctx.fillRect(rx+rw/2-1,ay-off,2,7);
      }
      ctx.strokeStyle='rgba(180,80,255,.3)';ctx.lineWidth=1;
      ctx.strokeRect(rx+.5,ry+.5,rw-1,rh-1);
      break;}
    case TL.WINDU:case TL.WINDR:case TL.WINDL:{
      const wc=type===TL.WINDU?'rgba(150,255,180,':'rgba(150,180,255,';
      ctx.fillStyle=wc+'.08)';ctx.fillRect(rx,ry,rw,rh);
      ctx.fillStyle=wc+'.5)';
      for(let k=0;k<3;k++){
        const t=(fr*.04+k/3)%1;
        const wx=rx+(type===TL.WINDR?t*rw:(type===TL.WINDL?(1-t)*rw:rw/2));
        const wy=ry+(type===TL.WINDU?(1-t)*rh:rh/2);
        ctx.fillRect(wx-1.5,wy-1.5,3,3);
      }
      break;}
    case TL.KEY:
      if(!colKeySet.has(idx)){
        const bob=Math.sin(fr*.12)*2;
        drawKey(rx+rw/2,ry+rh/2+bob);
      }
      break;
    case TL.DOOR:{
      const open=colKeys>=stg().keys;
      ctx.fillStyle=open?'rgba(100,60,0,.3)':'#774400';
      ctx.fillRect(rx,ry,rw,rh);
      ctx.strokeStyle=open?'rgba(255,200,0,.4)':'#ffcc00';
      ctx.lineWidth=2;ctx.strokeRect(rx+1,ry+1,rw-2,rh-2);
      if(!open){
        ctx.fillStyle='#ffcc00';ctx.fillRect(rx+rw/2-3,ry+rh/2-3,6,6);
        ctx.fillStyle='#000';ctx.fillRect(rx+rw/2-1,ry+rh/2-1,2,2);
      }
      break;}
    case TL.RHYTHM:{
      const on=rhythmOn();
      if(on){ ctx.fillStyle='#ff8800';ctx.fillRect(rx,ry,rw,rh);ctx.fillStyle='#ffaa44';ctx.fillRect(rx,ry,rw,2);}
      else  { ctx.strokeStyle='rgba(255,130,0,.3)';ctx.lineWidth=1;ctx.strokeRect(rx+.5,ry+.5,rw-1,rh-1);}
      break;}
    case TL.GOAL:{
      const pulse=.65+Math.sin(fr*.12)*.35;
      ctx.fillStyle=`rgba(255,220,0,${pulse})`;ctx.fillRect(rx,ry,rw,rh);
      ctx.fillStyle='#fff';ctx.fillRect(rx+rw/2-1,ry,2,rh);
      ctx.fillStyle='#ff4';
      ctx.beginPath();ctx.moveTo(rx+rw/2+1,ry+2);ctx.lineTo(rx+rw-2,ry+5);ctx.lineTo(rx+rw/2+1,ry+9);ctx.fill();
      break;}
    case TL.ONEWAY:
      ctx.fillStyle='#33aa55';ctx.fillRect(rx,ry,rw,3);
      ctx.fillStyle='rgba(50,170,80,.25)';ctx.fillRect(rx,ry+3,rw,rh-3);
      break;
    case TL.CONV_R:case TL.CONV_L:{
      ctx.fillStyle='#333';ctx.fillRect(rx,ry,rw,rh);
      ctx.fillStyle='#666';ctx.fillRect(rx,ry,rw,2);
      const dir=type===TL.CONV_R?1:-1;
      const off2=((fr*dir*.4)%T+T)%T;
      ctx.fillStyle='#999';
      for(let ax2=rx-T+off2;ax2<rx+rw+T;ax2+=T*1.5){
        if(ax2>=rx&&ax2<rx+rw) ctx.fillRect(ax2,ry+3,2,rh-6);
      }
      break;}
    case TL.SMALL:
      if(!colSmallSet.has(idx)){
        const bob2=Math.sin(fr*.15)*2;
        ctx.fillStyle='#ff88ff';ctx.fillRect(rx+2,ry+2+bob2,rw-4,rh-4);
        ctx.fillStyle='#ffccff';
        ctx.font='7px monospace';ctx.textAlign='center';
        ctx.fillText('S',rx+rw/2,ry+rh/2+3+bob2);
        ctx.textAlign='left';
      }
      break;
    case TL.CHECK:{
      const activated=colCheckSet.has(idx);
      // 旗ポール
      ctx.fillStyle=activated?'#88ff88':'#888';
      ctx.fillRect(rx+rw/2-1,ry,2,rh);
      // 旗
      ctx.fillStyle=activated?'#00ff88':'#555';
      ctx.beginPath();
      const flagWave=activated?Math.sin(fr*.15)*2:0;
      ctx.moveTo(rx+rw/2+1,ry+2);
      ctx.lineTo(rx+rw/2+8+flagWave,ry+5);
      ctx.lineTo(rx+rw/2+1,ry+9);
      ctx.fill();
      // 台座
      ctx.fillStyle='#666';ctx.fillRect(rx+rw/2-4,ry+rh-2,8,2);
      break;}
  }
}

function drawPortal(rx,ry,rw,rh,c1,c2){
  const cx2=rx+rw/2,cy2=ry+rh/2,r=Math.min(rw,rh)/2;
  const g=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,r);
  g.addColorStop(0,c1+'cc');g.addColorStop(1,c2+'00');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(cx2,cy2,r+Math.sin(fr*.15)*1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=c1+'cc';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx2,cy2,r*.75,fr*.05,fr*.05+Math.PI*1.6);ctx.stroke();
}

function drawKey(cx,cy){
  ctx.fillStyle='#ffcc00';
  ctx.beginPath();ctx.arc(cx,cy-3,4.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffcc00';ctx.fillRect(cx-1,cy-1,2,8);
  ctx.fillRect(cx+1,cy+4,4,2);ctx.fillRect(cx+1,cy+2,4,2);
  ctx.strokeStyle='#ff8800';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy-3,4.5,0,Math.PI*2);ctx.stroke();
}

function drawPlayer(){
  if(player.dead){
    ctx.globalAlpha=Math.max(0,1-player.deadTimer/60);
    ctx.fillStyle=player.phase===BLUE?'#4af':'#f44';
    ctx.beginPath();
    ctx.arc(player.x+player.w/2,player.y+player.h/2,
            player.w*(1+player.deadTimer/40),0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
    return;
  }
  const px=player.x,py=player.y,pw=player.w,pvh=player.h;
  if(player.invincible>0&&Math.floor(player.invincible/4)%2) ctx.globalAlpha=.3;
  ctx.save();
  ctx.translate(px+pw/2,py+pvh/2);
  if(player.gravDir<0) ctx.scale(1,-1);
  if(!player.facingR) ctx.scale(-1,1);
  // スクワッシュ＆ストレッチ（横は逆比率で体積を保つ）
  const sy=player.scaleY||1, sx2=1+(1-sy)*0.5;
  ctx.scale(sx2,sy);
  ctx.translate(-pw/2,-pvh/2);

  const body=player.phase===BLUE?'#2277ee':'#dd2222';
  const hi=player.phase===BLUE?'#66aaff':'#ff7777';
  const drk=player.phase===BLUE?'#114499':'#881111';
  // ヘルメット
  ctx.fillStyle=hi; ctx.fillRect(2,0,pw-4,6);
  ctx.fillStyle=body; ctx.fillRect(1,2,pw-2,4);
  // バイザー（透明感）
  ctx.fillStyle='rgba(180,240,255,0.55)';
  ctx.fillRect(2,2,pw-4,3);
  // アンテナ
  ctx.fillStyle=hi; ctx.fillRect(pw-4,0,2,2);
  ctx.fillStyle='#ffe000'; ctx.fillRect(pw-4,0,2,1);
  // 胴体
  ctx.fillStyle=body; ctx.fillRect(1,6,pw-2,pvh-9);
  ctx.fillStyle=drk; ctx.fillRect(1,6,2,pvh-9);
  // 胸マーク（フェーズアイコン）
  ctx.fillStyle=hi; ctx.fillRect(4,8,pw-7,2);
  // 足（歩きアニメ）
  const leg=[0,2,0,-2][player.animF]||0;
  ctx.fillStyle=drk;
  ctx.fillRect(1,pvh-3+leg,4,3);
  ctx.fillRect(pw-5,pvh-3-leg,4,3);
  // 靴先
  ctx.fillStyle='#ddd';
  ctx.fillRect(1,pvh-1+leg,5,1);
  ctx.fillRect(pw-6,pvh-1-leg,5,1);

  ctx.restore();
  ctx.globalAlpha=1;
}

function drawHUD(s){
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(2,2,170,16);
  ctx.fillStyle='#ccc';ctx.font='8px monospace';ctx.fillText(s.name,6,13);
  const pc=player.phase===BLUE?'#4af':'#f44';
  ctx.fillStyle=pc;ctx.fillRect(GW-40,2,38,16);
  ctx.fillStyle='#fff';ctx.fillText(player.phase===BLUE?'BLUE':' RED',GW-36,13);
  // SHIFTクールダウンバー（フェーズ表示の下）
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(GW-40,19,38,4);
  if(shiftCD>0){
    ctx.fillStyle='rgba(120,120,120,.7)';
    ctx.fillRect(GW-40,19,38*(shiftCD/15),4);
  } else {
    ctx.fillStyle=pc;ctx.fillRect(GW-40,19,38,4);
  }
  if(s.keys>0){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(2,20,72,14);
    ctx.fillStyle='#fc0';ctx.fillText(`KEY ${colKeys}/${s.keys}`,6,30);
  }
  if(player.small){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(2,36,70,14);
    ctx.fillStyle='#f8f';ctx.fillText(`SMALL ${Math.ceil(player.smallTimer/60)}s`,6,46);
  }
  ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='7px monospace';
  ctx.fillText(s.hint,4,GH-4);
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(GW-36,GH-14,34,12);
  ctx.fillStyle='#888';ctx.fillText(`${si+1}/${STAGES.length}`,GW-33,GH-5);
  // タイム（現在 / ベスト）
  const sec=Math.floor(stageTime/60), ms=String(stageTime%60).padStart(2,'0');
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(GW-80,GH-14,40,12);
  ctx.fillStyle='#888';ctx.fillText(`${sec}:${ms}`,GW-77,GH-5);
  const bk=Number(localStorage.getItem(`blink_best_s${si}`)||0);
  if(bk>0){
    const bs2=Math.floor(bk/60), bm2=String(bk%60).padStart(2,'0');
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(GW-80,GH-26,40,11);
    ctx.fillStyle='#0a6';ctx.font='6px monospace';ctx.fillText(`B:${bs2}:${bm2}`,GW-78,GH-17);
    ctx.font='8px monospace';
  }
  // 死亡カウンター
  if(deathCount>0){
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(GW-124,GH-14,40,12);
    ctx.fillStyle='#f66';ctx.fillText(`✕${deathCount}`,GW-121,GH-5);
  }
}

function drawTouchButtons(){
  const y=GH-46,sz=38;
  const alpha=.25;
  ctx.globalAlpha=alpha;
  // 左
  ctx.fillStyle=touch.L?'#fff':'#aaa';rr(4,y,sz,sz,7);ctx.fill();
  ctx.fillStyle='#000';ctx.font='18px monospace';ctx.fillText('◄',10,y+26);
  // 右
  ctx.fillStyle=touch.R?'#fff':'#aaa';rr(46,y,sz,sz,7);ctx.fill();
  ctx.fillStyle='#000';ctx.fillText('►',52,y+26);
  // DASH（中央）
  const dashCol=!player.dashReady?'#444':(touch.D?'#fff':'#fc8');
  ctx.fillStyle=dashCol;rr(GW/2-20,y,40,sz,7);ctx.fill();
  ctx.fillStyle='#000';ctx.font='8px monospace';ctx.fillText('DASH',GW/2-13,y+23);
  // SHIFT（CDが残っているときは暗く＋プログレス枠表示）
  const cdRatio=shiftCD/15;
  ctx.fillStyle=shiftCD>0?'#444':(touch.S?'#fff':(player.phase===BLUE?'#4af':'#f44'));
  rr(GW-92,y,sz+12,sz,7);ctx.fill();
  if(shiftCD>0){
    // CDプログレスバー（ボタン内部）
    ctx.fillStyle=player.phase===BLUE?'rgba(68,170,255,.6)':'rgba(255,60,60,.6)';
    ctx.fillRect(GW-92,y+sz*(1-cdRatio),sz+12,sz*cdRatio);
  }
  ctx.globalAlpha=alpha*1.3;
  ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.fillText('SHIFT',GW-86,y+23);
  ctx.globalAlpha=alpha;
  // JUMP
  ctx.fillStyle=touch.J?'#fff':'#aaa';rr(GW-46,y,sz,sz,7);ctx.fill();
  ctx.fillStyle='#000';ctx.font='18px monospace';ctx.fillText('▲',GW-40,y+26);
  ctx.globalAlpha=1;
}

function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawClearScreen(){
  const t=Math.min(1,fr/60);
  ctx.fillStyle=`rgba(0,0,0,${t*.75})`;ctx.fillRect(0,0,GW,GH);
  ctx.globalAlpha=t;
  ctx.fillStyle='#fc0';ctx.font='bold 26px monospace';ctx.textAlign='center';
  ctx.fillText('STAGE CLEAR!',GW/2,GH/2-20);
  ctx.fillStyle='#aaa';ctx.font='11px monospace';
  ctx.fillText(`PHASE ${si+1} COMPLETE`,GW/2,GH/2-2);
  // タイム表示
  const sec=Math.floor(stageTime/60), ms=String(stageTime%60).padStart(2,'0');
  ctx.fillStyle='#fff';ctx.font='10px monospace';
  ctx.fillText(`TIME  ${sec}:${ms}`,GW/2,GH/2+14);
  // ベストタイム
  const bs=Math.floor(clearBestTime/60), bm=String(clearBestTime%60).padStart(2,'0');
  if(clearIsNewBest){
    ctx.fillStyle='#0f8';
    ctx.fillText(`★ NEW BEST!`,GW/2,GH/2+28);
  } else {
    ctx.fillStyle='#888';
    ctx.fillText(`BEST  ${bs}:${bm}`,GW/2,GH/2+28);
  }
  // 死亡回数（累計）
  ctx.fillStyle=deathCount===0?'#0f8':'#fa0';
  ctx.fillText(deathCount===0?`NO DEATH ★`:`DEATHS ${deathCount}`,GW/2,GH/2+42);
  ctx.textAlign='left';ctx.globalAlpha=1;
}

function drawStageIntro(s){
  const DUR=90;
  const t=stageIntroT/DUR;
  // フェードイン→フェードアウト
  const alpha=t>0.6?((1-t)/0.4):(t>0.2?1:(t/0.2));
  // スライドイン（左から）
  const offX=(t>0.5?0:(0.5-t)/0.5)*-120;
  ctx.globalAlpha=alpha*0.9;
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.fillRect(offX+GW/2-110,GH/2-26,220,52);
  ctx.fillStyle=player.phase===BLUE?'#4af':'#f44';
  ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText(s.name,offX+GW/2,GH/2-8);
  ctx.fillStyle='#999';ctx.font='9px monospace';
  ctx.fillText(s.hint,offX+GW/2,GH/2+10);
  ctx.textAlign='left';ctx.globalAlpha=1;
}

// ================================================================
//  ステートマシン
// ================================================================
function resetStageState(){
  colKeys=0; colKeySet.clear(); colSmallSet.clear();
  colCheckSet.clear(); checkpoint=null; stageTime=0; fr=0;
  // 移動床を現在ステージの定義から再生成
  movers=(STAGES[si].movers||[]).map(m=>({
    x:m.x*T, y:m.y*T, w:m.w*T, h:m.h*T,
    ox:m.x*T, range:m.range*T, speed:m.speed||1,
    dir:1, phase:m.phase||0,
  }));
  // 敵を現在ステージの定義から再生成
  enemies=(STAGES[si].enemies||[]).map(e=>({
    x:e.x*T, y:e.y*T, w:10, h:10,
    ox:e.x*T, range:e.range*T, speed:e.speed||1,
    dir:1, animT:0,
    phase:e.phase||0,  // 0=両方に出る、BLUE/RED=そのフェーズのみ
  }));
}

function startGame(){
  si=0; resetStageState();
  deathCount=0;
  initPlayer(); cam.x=0; cam.y=0;
  gameState='playing';
  stageIntroT=90;
  ghosts=[];
  startBGM();
  document.getElementById('ov').classList.add('hidden');
}

function nextStage(){
  si++;
  if(si>=STAGES.length){
    // ランク判定（死亡0→S、1-2→A、3-5→B、6+→C）
    const rank=deathCount===0?'S':deathCount<=2?'A':deathCount<=5?'B':'C';
    const rankColor=rank==='S'?'🌟':rank==='A'?'⭐':rank==='B'?'✨':'💫';
    document.getElementById('ov-title').textContent='ALL CLEAR!!';
    document.getElementById('ov-sub').textContent=
      `全6ステージクリア！おめでとう！\n死亡回数: ${deathCount}回　ランク: ${rankColor} ${rank}`;
    document.getElementById('ov-ctrl').textContent=
      rank==='S'?'ノーデスクリア！伝説のプレイヤー！':
      rank==='A'?'素晴らしいプレイ！':
      rank==='B'?'なかなかやるじゃないか！':'まだまだ練習が必要？また挑戦しよう！';
    document.getElementById('ov-btn').textContent='もう一度';
    document.getElementById('ov-btn').onclick=startGame;
    document.getElementById('ov').classList.remove('hidden');
    stopBGM();
    gameState='title'; return;
  }
  resetStageState();
  initPlayer(); cam.x=0; cam.y=0;
  gameState='playing';
  stageIntroT=90;
}

document.getElementById('ov-btn').addEventListener('click',startGame);

// ================================================================
//  メインループ
// ================================================================
const stg0=STAGES[0]; si=0; initPlayer();

function loop(){
  update();
  draw();
  if(gameState==='playing') stageTime++;
  if(gameState==='clear'&&fr>100) nextStage();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
